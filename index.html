<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Time</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(1.5rem);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes tick {
      0% { transform: scale(1); }
      15% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 20px rgba(148, 163, 184, 0.15); }
      50% { text-shadow: 0 0 40px rgba(148, 163, 184, 0.35); }
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a5f, #1e293b, #0f172a);
      background-size: 300% 300%;
      animation: gradientShift 12s ease infinite;
      color: #f8fafc;
    }

    main {
      text-align: center;
      padding: 2rem;
      animation: fadeInUp 0.8s ease-out both;
    }

    h1 {
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 1.5rem;
      animation: fadeInUp 0.8s ease-out 0.15s both;
    }

    #time {
      font-size: clamp(3rem, 12vw, 6rem);
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
      line-height: 1.1;
      animation: glow 4s ease-in-out infinite;
      transition: transform 0.2s ease;
    }

    #time.tick {
      animation: glow 4s ease-in-out infinite, tick 0.4s ease-out;
    }

    #date {
      margin-top: 1rem;
      font-size: 1.125rem;
      color: #cbd5e1;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Current Time</h1>
    <div id="time" aria-live="polite">--:--:--</div>
    <div id="date"></div>
  </main>

  <script>
    const timeEl = document.getElementById("time");
    const dateEl = document.getElementById("date");

    function updateClock() {
      const now = new Date();

      timeEl.textContent = now.toLocaleTimeString(undefined, {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
      });

      timeEl.classList.remove("tick");
      void timeEl.offsetWidth;
      timeEl.classList.add("tick");

      dateEl.textContent = now.toLocaleDateString(undefined, {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric",
      });
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
